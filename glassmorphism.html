<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iván - Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px 30px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .avatar-glow {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0));
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .tagline {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            font-weight: 300;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            margin: 25px 0 12px;
            font-weight: 600;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-decoration: none;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .link:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .link-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-right: 14px;
            font-size: 16px;
        }

        .projects {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .project-card h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #fff;
        }

        .project-card p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .floating-orb {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 100px;
            height: 100px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 60px;
            height: 60px;
            top: 70%;
            right: 15%;
            animation-delay: -2s;
        }

        .orb-3 {
            width: 80px;
            height: 80px;
            bottom: 20%;
            left: 5%;
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
    </style>
</head>
<body>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>

    <div class="container">
        <div class="glass-card">
            <div class="avatar-wrapper">
                <div class="avatar-glow"></div>
                <img src="avatar.jpg" alt="Avatar" class="avatar">
            </div>
            
            <h1>Iván</h1>
            <div class="tagline">Desarrollador • Creador • Consultor</div>

            <div class="section-label">Conectar</div>
            <div class="links">
                <a href="#" class="link">
                    <span class="link-icon">𝕏</span>Twitter
                </a>
                <a href="#" class="link">
                    <span class="link-icon">◆</span>GitHub
                </a>
                <a href="#" class="link">
                    <span class="link-icon">in</span>LinkedIn
                </a>
                <a href="#" class="link">
                    <span class="link-icon">▶</span>YouTube
                </a>
            </div>

            <div class="section-label">Proyectos</div>
            <div class="projects">
                <div class="project-card">
                    <h3>OpenClaw</h3>
                    <p>Automatización inteligente</p>
                </div>
                <div class="project-card">
                    <h3>ClawHub</h3>
                    <p>Marketplace de skills</p>
                </div>
            </div>

            <div class="section-label">Contacto</div>
            <div class="links">
                <a href="#" class="link">
                    <span class="link-icon">✉</span>Email
                </a>
                <a href="#" class="link">
                    <span class="link-icon">✐</span>Blog
                </a>
            </div>

            <div class="footer">2024 • Hecho con cariño</div>
        </div>
    </div>
</body>
</html>
