<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVÁN // Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #fff;
            color: #000;
            min-height: 100vh;
            border: 8px solid #000;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .avatar {
            width: 180px;
            height: 180px;
            border: 6px solid #000;
            display: block;
            margin: 0 auto 20px;
            filter: grayscale(100%);
        }

        h1 {
            font-size: 48px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            text-align: center;
            margin-bottom: 10px;
            line-height: 1;
        }

        .tagline {
            text-align: center;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            padding: 10px;
            border: 3px solid #FF0000;
            background: #FF0000;
            color: #fff;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 30px 0 15px;
            padding: 8px;
            background: #000;
            color: #fff;
            display: inline-block;
        }

        .links {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0;
        }

        .link {
            display: block;
            padding: 18px 20px;
            border: 4px solid #000;
            text-decoration: none;
            color: #000;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            transition: all 0.1s ease;
            margin-bottom: -4px;
            background: #fff;
        }

        .link:hover {
            background: #000;
            color: #fff;
        }

        .link:hover .arrow {
            background: #FF0000;
        }

        .link-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .arrow {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: #000;
            color: #fff;
            text-align: center;
            line-height: 30px;
            font-size: 20px;
            transition: all 0.1s ease;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .project-card {
            border: 4px solid #000;
            padding: 20px;
            background: #fff;
        }

        .project-card h3 {
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .project-card p {
            font-size: 12px;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 4px solid #000;
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .accent-block {
            background: #FF0000;
            height: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="avatar.jpg" alt="Avatar" class="avatar">
        
        <h1>IVÁN</h1>
        <div class="tagline">Desarrollador // Creador // Consultor</div>
        
        <div class="accent-block"></div>

        <div class="section-title">Conectar</div>
        <div class="links">
            <a href="#" class="link">
                <div class="link-content">
                    <span>Twitter</span>
                    <span class="arrow">→</span>
                </div>
            </a>
            <a href="#" class="link">
                <div class="link-content">
                    <span>GitHub</span>
                    <span class="arrow">→</span>
                </div>
            </a>
            <a href="#" class="link">
                <div class="link-content">
                    <span>LinkedIn</span>
                    <span class="arrow">→</span>
                </div>
            </a>
            <a href="#" class="link">
                <div class="link-content">
                    <span>YouTube</span>
                    <span class="arrow">→</span>
                </div>
            </a>
        </div>

        <div class="section-title">Proyectos</div>
        <div class="projects-grid">
            <div class="project-card">
                <h3>OpenClaw</h3>
                <p>Automatización inteligente y asistentes digitales.</p>
            </div>
            <div class="project-card">
                <h3>ClawHub</h3>
                <p>Marketplace de skills para agentes.</p>
            </div>
        </div>

        <div class="section-title">Contacto</div>
        <div class="links">
            <a href="#" class="link">
                <div class="link-content">
                    <span>Email</span>
                    <span class="arrow">→</span>
                </div>
            </a>
            <a href="#" class="link">
                <div class="link-content">
                    <span>Blog</span>
                    <span class="arrow">→</span>
                </div>
            </a>
        </div>

        <div class="footer">
            © 2024 // Hecho con código
        </div>
    </div>
</body>
</html>
